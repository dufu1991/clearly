        function normalizeLanguage(input) {
            if (!input) return null;
            const value = input.toLowerCase();

            if (value.startsWith("zh")) {
                if (value.includes("hant") || value.includes("tw") || value.includes("hk") || value.includes("mo")) {
                    return "zh-Hant";
                }
                return "zh-Hans";
            }

            if (value.startsWith("ja")) return "ja";
            if (value.startsWith("ko")) return "ko";
            if (value.startsWith("es")) return "es";
            if (value.startsWith("ru")) return "ru";
            if (value.startsWith("fr")) return "fr";
            if (value.startsWith("de")) return "de";
            if (value.startsWith("it")) return "it";
            if (value.startsWith("en")) return "en";

            return null;
        }

        function getInitialLanguage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved && TRANSLATIONS[saved]) return saved;

            const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length > 0
                ? navigator.languages
                : [navigator.language];

            for (const language of browserLanguages) {
                const normalized = normalizeLanguage(language);
                if (normalized && TRANSLATIONS[normalized]) return normalized;
            }

            return "en";
        }

        function renderSections(sections) {
            const container = document.getElementById("sections");
            container.innerHTML = sections.map(([title, paragraph]) => `
                <section>
                    <h2>${title}</h2>
                    <p>${paragraph}</p>
                </section>
            `).join("");
        }

        function setLanguage(language, persist = true) {
            const copy = TRANSLATIONS[language] || TRANSLATIONS.en;

            document.documentElement.lang = HTML_LANG[language] || "en";
            document.title = copy.metaTitle;
            document.getElementById("meta-description").setAttribute("content", copy.metaDescription);
            document.getElementById("page-title").textContent = copy.title;
            document.getElementById("updated").textContent = copy.updated;
            document.getElementById("language-label").textContent = copy.footer.language;
            document.getElementById("language-select").setAttribute("aria-label", copy.footer.language);
            document.getElementById("footer-links").innerHTML = `<a href="/">${copy.footer.home}</a> &middot; &copy; 2026 Sabotage Media, LLC`;

            renderSections(copy.sections);

            const select = document.getElementById("language-select");
            select.value = language;

            if (persist) {
                localStorage.setItem(STORAGE_KEY, language);
            }
        }

        function populateLanguageSelect() {
            const select = document.getElementById("language-select");
            select.innerHTML = SUPPORTED_LANGUAGES.map(([code, label]) => `<option value="${code}">${label}</option>`).join("");
            select.addEventListener("change", (event) => {
                setLanguage(event.target.value, true);
            });
        }

        populateLanguageSelect();
        setLanguage(getInitialLanguage(), false);
    </script>
</body>
</html>
