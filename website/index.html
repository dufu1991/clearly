    <link rel="manifest" href="/site.webmanifest">
    <title>Clearly Markdown — A native markdown editor and document workspace for Mac</title>
    <meta id="meta-description" name="description" content="A native markdown editor and document workspace for macOS. Open folders, browse files, write with syntax highlighting, and preview instantly.">
    <meta property="og:title" content="Clearly Markdown">
    <meta id="meta-og-description" property="og:description" content="A native markdown editor and document workspace for Mac.">
    <meta property="og:image" content="https://clearly.md/icon.png">
    <meta property="og:url" content="https://clearly.md">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px 60px;
            text-align: center;
        }

        .icon {
            width: 160px;
            height: 160px;
            border-radius: 36px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #999;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1em;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }

        .btn.primary {
            background: #fff;
            color: #0a0a0a;
        }

        .btn.secondary {
            background: #222;
            color: #e0e0e0;
        }

        .btn svg { flex-shrink: 0; }

        .requires {
            font-size: 0.85em;
            color: #666;
        }

        .features {
            margin-top: 80px;
            text-align: left;
        }

        .features h2 {
            font-size: 1.1em;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
            text-align: center;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .feature-grid .feature:last-child:nth-child(odd) {
            grid-column: 1 / -1;
        }

        .feature {
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
        }

        .feature h3 {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 6px;
            color: #f0f0f0;
        }

        .feature p {
            font-size: 0.9em;
            color: #888;
            line-height: 1.5;
        }

        .feature a {
            color: #ccc;
            text-decoration: underline;
        }

        .screenshot {
            max-width: 100%;
            width: 100%;
            margin-top: 60px;
            border-radius: 12px;
        }

        footer {
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
            color: #444;
            font-size: 0.85em;
        }

        footer p {
            line-height: 1.6;
            margin-bottom: 16px;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        footer a:hover { color: #999; }

        .language-switcher {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .language-switcher label {
            color: #666;
        }

        .language-switcher select {
            min-width: 180px;
            padding: 10px 14px;
            border: 1px solid #222;
            border-radius: 10px;
            background: #141414;
            color: #e0e0e0;
            font: inherit;
        }

        @media (max-width: 500px) {
            .container { padding: 48px 20px 40px; }
            h1 { font-size: 1.8em; }
            .icon { width: 120px; height: 120px; border-radius: 28px; }
            .feature-grid { grid-template-columns: 1fr; }
            .language-switcher { flex-direction: column; }
        }
    </style>
</head>

                    ["Evidenziazione del codice", "27+ linguaggi con numeri di riga ed evidenziazione diff. Intestazioni con nome file nei blocchi di codice e copia con un clic."],
                    ["Callout e Admonition", "Callout in stile GitHub e Obsidian: NOTE, TIP, WARNING e altri 15 tipi. Piegabili con un clic."],
                    ["Anteprima interattiva", "Attiva le checkbox delle attività, fai clic sulle immagini per zoomare, passa sulle note per vedere i popover e fai doppio clic per tornare al sorgente."],
                    ["Markdown esteso", "Supporta ==evidenziazioni==, ^apice^, ~pedice~, scorciatoie :emoji: e sommario generato automaticamente."],
                    ["Alternanza editor / anteprima", "Passa dalla scrittura alla lettura con ⌘1 e ⌘2. La posizione di scorrimento resta sincronizzata tra entrambe."],
                    ["Esportazione PDF", "Esporta il documento in PDF o invialo direttamente a una stampante. Le interruzioni di pagina funzionano come dovrebbero."],
                    ["Scorciatoie di formattazione", "⌘B per il grassetto, ⌘I per il corsivo, ⌘K per i link. Le scorciatoie da tastiera che ti aspetti su Mac."],
                    ["Scratchpad", "Un’app da barra dei menu con tasto rapido globale per annotare qualcosa al volo senza aprire un documento completo."],
                    ["QuickLook", "Visualizza i file Markdown direttamente nel Finder. Premi Spazio su qualsiasi file `.md`."],
                    ["Chiaro e scuro", "Segue l’aspetto del sistema oppure può essere impostato manualmente. In entrambi i casi ha un ottimo aspetto."],
                    ["Open source", "Gratis e open source su <a href=\"https://github.com/Shpigford/clearly\">GitHub</a>. Guarda come funziona, apri issue e contribuisci."]
                ],
                footer: {
                    madeBy: "Creato da",
                    privacy: "Privacy",
                    language: "Lingua"
                }
            }
        };

        function normalizeLanguage(input) {
            if (!input) return null;
            const value = input.toLowerCase();

            if (value.startsWith("zh")) {
                if (value.includes("hant") || value.includes("tw") || value.includes("hk") || value.includes("mo")) {
                    return "zh-Hant";
                }
                return "zh-Hans";
            }

            if (value.startsWith("ja")) return "ja";
            if (value.startsWith("ko")) return "ko";
            if (value.startsWith("es")) return "es";
            if (value.startsWith("ru")) return "ru";
            if (value.startsWith("fr")) return "fr";
            if (value.startsWith("de")) return "de";
            if (value.startsWith("it")) return "it";
            if (value.startsWith("en")) return "en";

            return null;
        }

        function getInitialLanguage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved && TRANSLATIONS[saved]) return saved;

            const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length > 0
                ? navigator.languages
                : [navigator.language];

            for (const language of browserLanguages) {
                const normalized = normalizeLanguage(language);
                if (normalized && TRANSLATIONS[normalized]) return normalized;
            }

            return "en";
        }

        function renderFeatures(items) {
            const grid = document.getElementById("feature-grid");
            grid.innerHTML = items.map(([title, description]) => `
                <div class="feature">
                    <h3>${title}</h3>
                    <p>${description}</p>
                </div>
            `).join("");
        }

        function renderFooter(copy) {
            const footer = document.getElementById("footer-links");
            footer.innerHTML = `&copy; ${copy.madeBy} <a href="https://x.com/Shpigford">@Shpigford</a> &middot; <a href="https://github.com/Shpigford/clearly">GitHub</a> &middot; <a href="/privacy">${copy.privacy}</a>`;
        }

        function setLanguage(language, persist = true) {
            const copy = TRANSLATIONS[language] || TRANSLATIONS.en;

            document.documentElement.lang = HTML_LANG[language] || "en";
            document.title = copy.metaTitle;
            document.getElementById("meta-description").setAttribute("content", copy.metaDescription);
            document.getElementById("meta-og-description").setAttribute("content", copy.ogDescription);

            document.getElementById("subtitle").textContent = copy.subtitle;
            document.getElementById("button-app-store").textContent = copy.buttons.appStore;
            document.getElementById("button-download").textContent = copy.buttons.download;
            document.getElementById("button-github").textContent = copy.buttons.github;
            document.getElementById("requires").innerHTML = copy.requires.replace(" · ", " &middot; ");
            document.getElementById("screenshot").setAttribute("alt", copy.screenshotAlt);
            document.getElementById("features-title").textContent = copy.featuresTitle;
            document.getElementById("language-label").textContent = copy.footer.language;
            document.getElementById("language-select").setAttribute("aria-label", copy.footer.language);

            renderFeatures(copy.features);
            renderFooter(copy.footer);

            const select = document.getElementById("language-select");
            select.value = language;

            if (persist) {
                localStorage.setItem(STORAGE_KEY, language);
            }
        }

        function populateLanguageSelect() {
            const select = document.getElementById("language-select");
            select.innerHTML = SUPPORTED_LANGUAGES.map(([code, label]) => `<option value="${code}">${label}</option>`).join("");
            select.addEventListener("change", (event) => {
                setLanguage(event.target.value, true);
            });
        }

        populateLanguageSelect();
        setLanguage(getInitialLanguage(), false);
    </script>
</body>
</html>
